<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Free Discovery Call — NextLogicAI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAV (injected) -->
<script src="shared.js"></script>

<section class="section">
  <div class="container">

    <!-- HEADER -->
    <div style="margin-bottom: 40px;">
      <h1>Book a Discovery Call</h1>
      <p style="opacity: 0.7; max-width: 600px;">
        45 minutes. No pitch. Just a real conversation about your business, your bottlenecks, and how AI can actually help.
      </p>
    </div>

    <!-- FORM CARD -->
    <div class="form-box">

      <form id="contactForm">
        <h2 style="margin-bottom: 20px;">Tell us about your business</h2>

        <!-- NAME ROW -->
        <div class="input-group">
          <input type="text" id="fname" name="fname" placeholder="First Name" required>
          <input type="text" id="lname" name="lname" placeholder="Last Name">
        </div>

        <!-- EMAIL -->
        <input type="email" id="email" name="email" placeholder="Email Address" required>

        <!-- BUSINESS -->
        <input type="text" id="business" name="business" placeholder="Business Name">

        <!-- INDUSTRY -->
        <select id="industry" name="industry" required>
          <option value="">Select your industry</option>
          <option>Trades & Field Services</option>
          <option>Salons & Hospitality</option>
          <option>Real Estate</option>
          <option>Professional Services</option>
          <option>Retail & E-Commerce</option>
          <option>Health & Wellness</option>
          <option>Coaching & Consulting</option>
          <option>Other</option>
        </select>

        <!-- PROBLEM -->
        <textarea id="pain" name="pain" placeholder="Biggest problem you're trying to solve"></textarea>

        <!-- TIMELINE -->
        <select id="timeline" name="timeline">
          <option value="">Timeline</option>
          <option>As soon as possible</option>
          <option>Within the next month</option>
          <option>1 to 3 months</option>
          <option>Just exploring</option>
        </select>

        <!-- SUBMIT -->
        <button type="submit" class="btn">
          Request a Discovery Call →
        </button>

        <!-- STATUS -->
        <p id="formStatus" class="form-note"></p>
      </form>

      <!-- SUCCESS STATE -->
      <div id="formSuccess" style="display:none; text-align:center; padding: 30px;">
        <h3>Request received!</h3>
        <p>We’ll be in touch within 4 business hours.</p>
      </div>

    </div>

  </div>
</section>

<!-- SCRIPTS (moved to bottom for stability) -->
<script src="contact.js"></script>
<script>
  injectNav('contact');
  injectFooter();
</script>

</body>
</html>
