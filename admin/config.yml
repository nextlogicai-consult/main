backend:
  name: github
  repo: nextlogicai-consult/Main
  branch: main
  base_url: https://www.nextlogic-ai.com/api/callback
  auth_endpoint: /auth
  
media_folder: "images/blog"
public_folder: "/images/blog"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "AI for Small Business", value: "ai-small-business" }
          - { label: "Workflow Automation", value: "workflow-automation" }
          - { label: "AI Tools & Selection", value: "ai-tools" }
          - { label: "Industry Guides", value: "industry-guides" }
          - { label: "ROI & Strategy", value: "roi-strategy" }
          - { label: "Training & Adoption", value: "training-adoption" }
      - { label: "Read Time (e.g. 7 min)", name: "readtime", widget: "string" }
      - { label: "Summary", name: "description", widget: "text" }
      - { label: "Featured Post?", name: "featured", widget: "boolean", default: false }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "Meta Title", name: "meta_title", widget: "string", required: false, hint: "60 chars max. Defaults to post title if left blank." }
          - { label: "Meta Description", name: "meta_description", widget: "text", required: false, hint: "150–160 chars. This is what shows in Google search results." }
          - { label: "Slug", name: "slug", widget: "string", required: false, hint: "e.g. what-ai-can-do-for-small-business-2026" }
      - { label: "Body", name: "body", widget: "markdown" }
